# ═══════════════════════════════════════════════════════════════════════════
# Zorvyn Finance Dashboard — Development Profile
# ═══════════════════════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:h2:mem:zorvyn_finance;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/migration
    # H2 is used in dev mode for zero-dependency local development
    # PostgreSQL is used in prod/docker profiles

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.zorvyn.finance: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
