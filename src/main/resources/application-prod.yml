# ═══════════════════════════════════════════════════════════════════════════
# Zorvyn Finance Dashboard — Production Profile
# ═══════════════════════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zorvyn_finance}
    username: ${DB_USERNAME:zorvyn}
    password: ${DB_PASSWORD:zorvyn_secret}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.zorvyn.finance: INFO
    org.springframework: WARN
    org.hibernate: WARN
    root: WARN
